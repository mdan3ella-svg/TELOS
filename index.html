<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TELOS | Telemetry Lifecycle Orchestration Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B0F19] text-gray-200 min-h-screen font-sans">
    <!-- Auth Gate -->
    <div id="auth-gate" class="fixed inset-0 bg-[#0B0F19] z-50 flex items-center justify-center p-6">
        <div class="bg-[#161C2C] p-8 rounded-lg border border-slate-700 w-full max-w-sm">
            <h2 class="text-white font-bold mb-4">Beta Access Required</h2>
            <input type="password" id="beta-token" placeholder="Enter Beta Access Token" class="w-full bg-slate-900 border border-slate-700 p-3 rounded mb-4 text-sm">
            <button onclick="telosApp.init()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold uppercase rounded transition">Authenticate</button>
        </div>
    </div>

    <header id="main-header" class="hidden flex justify-between items-center p-6 border-b border-slate-800 bg-[#161C2C]">
        <div>
            <h1 class="text-2xl font-bold text-white tracking-widest">TELOS <span class="text-blue-500">| SUITE</span></h1>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">v1.0.0-BETA | Build: 2026.06.29</p>
        </div>
    </header>

    <main id="app-root" class="p-8">
        <div class="text-center text-slate-500 mt-20">Initializing TELOS Orchestrator...</div>
    </main>

    <script>
        const telosApp = {
            nodes: [],
            state: { currentView: 'orchestrator', selectedNodeId: 1 },
            
            async init() {
                const token = document.getElementById('beta-token').value;
                if (token === "TELOS-BETA-2026") {
                    this.startSession();
                    await this.loadData();
                    this.render();
                } else { alert("Invalid Beta Access Token."); }
            },

            startSession() {
                localStorage.setItem('telos_auth_ts', Date.now().toString());
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('main-header').classList.remove('hidden');
            },

            checkSession() {
                const ts = localStorage.getItem('telos_auth_ts');
                if (!ts || (Date.now() - parseInt(ts) > 30 * 60 * 1000)) {
                    document.getElementById('auth-gate').classList.remove('hidden');
                    document.getElementById('main-header').classList.add('hidden');
                    return false;
                }
                return true;
            },

            async loadData() {
                // Fallback architecture: Priority to saved state, then fetch
                const savedNodes = localStorage.getItem('telos_nodes');
                if (savedNodes) {
                    this.nodes = JSON.parse(savedNodes);
                } else {
                    // Placeholder for your actual local config path
                    try {
                        const response = await fetch('./config/Lifecycle.json');
                        this.nodes = (await response.json()).nodes;
                        localStorage.setItem('telos_nodes', JSON.stringify(this.nodes));
                    } catch (e) {
                        console.error("Fetch failed, using minimal registry.");
                        this.nodes = [{id: 1, title: "Registry Loaded", description: "Standalone Mode."}];
                    }
                }
            },

            render() {
                if(!this.checkSession()) return;
                const root = document.getElementById('app-root');
                const selected = this.nodes.find(n => n.id === this.state.selectedNodeId) || this.nodes[0];
                root.innerHTML = `
                    <div class="grid grid-cols-12 gap-8 max-w-7xl mx-auto">
                        <div class="col-span-4 grid grid-cols-1 gap-2">
                            ${this.nodes.map(n => `<button onclick="telosApp.selectNode(${n.id})" class="text-left bg-[#161C2C] border ${this.state.selectedNodeId === n.id ? 'border-blue-500' : 'border-slate-700'} p-4 rounded hover:border-blue-500 transition"><div class="text-white text-sm font-bold">${n.title}</div></button>`).join('')}
                        </div>
                        <div class="col-span-8 bg-[#161C2C] border border-slate-700 p-8 rounded shadow-xl">
                            <h2 class="text-blue-400 text-xl font-bold mb-4">${selected.title}</h2>
                            <p class="text-gray-300 text-sm mb-6">${selected.description}</p>
                            <div class="bg-[#0B0F19] p-4 rounded font-mono text-green-500 text-xs overflow-x-auto">${selected.snippet || 'No implementation data.'}</div>
                        </div>
                    </div>`;
            },

            selectNode(id) { 
                this.state.selectedNodeId = id; 
                localStorage.setItem('telos_state', JSON.stringify(this.state));
                this.render(); 
            }
        };

        window.onload = () => {
            const savedState = localStorage.getItem('telos_state');
            if (savedState) telosApp.state = JSON.parse(savedState);
            if (telosApp.checkSession()) {
                telosApp.loadData().then(() => telosApp.render());
            }
        };
    </script>
</body>
</html>
